<div class="login-container">

  <div class="login-card">

    <div class="logo-section">

      <h1>KeyShell Payment</h1>
      
      <p>Enterprise Payment Platform</p>

    </div>

    <form>

      <div class="form-group">

        <label>Email</label>

        <input
          type="email"
          [(ngModel)]="email"
          name="email"
          placeholder="admin@keyshell.com">

      </div>

      <div class="form-group">

        <label>Password</label>

        <input
          type="password"
          [(ngModel)]="password"
          name="password"
          placeholder="••••••••">

      </div>

      <button
        type="button"
        (click)="login()">

        Login

      </button>

    </form>

  </div>

</div>
