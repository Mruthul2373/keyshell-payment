<div class="dashboard-layout">

  <app-sidebar></app-sidebar>

  <div class="main-content">

    <app-navbar></app-navbar>

    <div class="users-container">

      <h2>Users Management</h2>

      <table>

        <thead>
          <tr>
            <th>Name</th>
            <th>Email</th>
            <th>Role</th>
          </tr>
        </thead>

        <tbody>

          <tr *ngFor="let user of users">
            <td>{{ user.name }}</td>
            <td>{{ user.email }}</td>
            <td>{{ user.role }}</td>
          </tr>

        </tbody>

      </table>

    </div>

  </div>

</div>
